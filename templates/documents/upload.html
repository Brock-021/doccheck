{% extends "base.html" %}
{% block title %}上传检查 - DocCheck{% endblock %}
{% block page_title %}📄 上传文档检查{% endblock %}

{% block content %}
<form method="post" action="/api/documents/upload" enctype="multipart/form-data" id="uploadForm">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
    <div class="form-group">
      <label for="doc_type_id">文档类型</label>
      <select id="doc_type_id" name="doc_type_id" required>
        <option value="">— 请选择文档类型 —</option>
        {% for dt in doc_types %}
        <option value="{{ dt.id }}">{{ dt.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="stage">检查阶段</label>
      <select id="stage" name="stage">
        <option value="all" selected>通用</option>
        <option value="initial">初检</option>
        <option value="final">终检</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label>上传文件（仅支持 .docx）</label>
    <div class="drop-zone" id="dropZone">
      <p>📁 拖拽文件到此处，或点击选择文件</p>
      <p style="font-size: 0.75rem; margin-top: 0.5rem; color: #94a3b8;">最大 50MB</p>
      <input type="file" id="fileInput" name="file" accept=".docx" style="display: none;">
    </div>
    <div id="fileInfo" style="display: none; margin-top: 0.5rem; padding: 0.5rem; background: #f0fdf4; border-radius: 4px; font-size: 0.875rem;"></div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary" id="submitBtn">🚀 开始检查</button>
  </div>
</form>

<!-- 检查过程区域：初始隐藏 -->
<div id="resultArea" style="display: none; margin-top: 2rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;">
  <!-- 检查中：loader -->
  <div id="checkingPanel">
    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-top: 1rem; font-size: 1.1rem; font-weight: 500;">🔍 AI 正在检查文档合规性...</p>
      <p style="margin-top: 0.5rem; font-size: 0.85rem; color: #94a3b8;" id="checkStatusHint">正在解析文档内容</p>
    </div>
  </div>
  <!-- 检查完成：操作按钮 -->
  <div id="donePanel" style="display: none;">
    <div style="font-size: 3rem; margin-bottom: 0.5rem;">✅</div>
    <p style="font-size: 1.1rem; font-weight: 500; color: #22c55e; margin-bottom: 1.5rem;">AI 检查已完成！</p>
    <div class="form-actions" style="justify-content: center;">
      <a id="viewReportLink" href="/documents" class="btn btn-primary" style="min-width: 140px; justify-content: center;">📄 查看报告</a>
      <a href="/documents" class="btn" style="min-width: 140px; justify-content: center;">📂 文档列表</a>
    </div>
  </div>
  <!-- 检查失败 -->
  <div id="failedPanel" style="display: none;">
    <div style="font-size: 3rem; margin-bottom: 0.5rem;">❌</div>
    <p style="font-size: 1.1rem; font-weight: 500; color: #ef4444; margin-bottom: 0.5rem;">检查失败</p>
    <p id="errorMessage" style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 1.5rem;"></p>
    <a href="/documents/upload" class="btn btn-primary" style="justify-content: center;">🔄 重新上传</a>
  </div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const submitBtn = document.getElementById('submitBtn');
const uploadForm = document.getElementById('uploadForm');
const resultArea = document.getElementById('resultArea');
const checkingPanel = document.getElementById('checkingPanel');
const donePanel = document.getElementById('donePanel');
const failedPanel = document.getElementById('failedPanel');
const viewReportLink = document.getElementById('viewReportLink');
const checkStatusHint = document.getElementById('checkStatusHint');
const errorMessage = document.getElementById('errorMessage');

// Click to select
dropZone.addEventListener('click', () => fileInput.click());

// Drag & drop
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) {
    fileInput.files = e.dataTransfer.files;
    showFileInfo(fileInput.files[0]);
  }
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) showFileInfo(fileInput.files[0]);
});

function showFileInfo(file) {
  const sizeMB = (file.size / 1024 / 1024).toFixed(2);
  fileInfo.style.display = 'block';
  fileInfo.innerHTML = `✅ 已选择: <strong>${file.name}</strong> (${sizeMB}MB)`;
  if (file.size > 50 * 1024 * 1024)
    fileInfo.innerHTML += '<br><span style="color: #dc2626;">⚠️ 文件超过 50MB 限制</span>';
  if (!file.name.toLowerCase().endsWith('.docx'))
    fileInfo.innerHTML += '<br><span style="color: #dc2626;">⚠️ 仅支持 .docx 格式</span>';
}

function showPanel(panel) {
  checkingPanel.style.display = panel === 'checking' ? '' : 'none';
  donePanel.style.display = panel === 'done' ? '' : 'none';
  failedPanel.style.display = panel === 'failed' ? '' : 'none';
}

const statusHints = [
  '正在解析文档内容...',
  '正在比对检查规则...',
  'AI 正在逐条判定合规性...',
  '即将完成，正在生成报告...',
];

uploadForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData(uploadForm);
  const file = fileInput.files[0];

  if (!file) { alert('请先选择文件'); return; }
  if (!formData.get('doc_type_id')) { alert('请选择文档类型'); return; }
  if (!file.name.toLowerCase().endsWith('.docx')) { alert('仅支持 .docx 格式'); return; }
  if (file.size > 50 * 1024 * 1024) { alert('文件大小不能超过 50MB'); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = '⏳ 上传中...';
  resultArea.style.display = 'block';
  showPanel('checking');

  // Rotate status hints
  let hintIdx = 0;
  const hintTimer = setInterval(() => {
    hintIdx = (hintIdx + 1) % statusHints.length;
    checkStatusHint.textContent = statusHints[hintIdx];
  }, 4000);

  try {
    const resp = await fetch('/api/documents/upload', {
      method: 'POST',
      body: formData,
    });

    const data = await resp.json();

    if (resp.ok) {
      checkStatusHint.textContent = '已提交到检查队列，正在等待执行...';

      // Poll for completion
      const taskId = data.check_task_id;
      const docId = data.document_id;
      const pollInterval = setInterval(async () => {
        const statusResp = await fetch(`/api/documents/check-tasks/${taskId}/status`);
        const statusData = await statusResp.json();

        if (statusData.status === 'done') {
          clearInterval(pollInterval);
          clearInterval(hintTimer);

          let reportId = null;
          try {
            const histResp = await fetch(`/api/documents/${docId}/history`);
            const histData = await histResp.json();
            if (histData && histData.length > 0) {
              reportId = histData[0].report_id;
            }
          } catch(e) {}

          if (reportId) {
            viewReportLink.href = `/reports/${reportId}`;
          }
          showPanel('done');
          submitBtn.disabled = false;
          submitBtn.textContent = '🚀 开始检查';
        } else if (statusData.status === 'failed') {
          clearInterval(pollInterval);
          clearInterval(hintTimer);
          errorMessage.textContent = statusData.error_message || 'AI 检查服务异常，请稍后重试';
          showPanel('failed');
          submitBtn.disabled = false;
          submitBtn.textContent = '🚀 开始检查';
        } else if (statusData.status === 'running') {
          checkStatusHint.textContent = 'AI 正在逐条检查文档内容...';
        }
      }, 3000);
    } else {
      clearInterval(hintTimer);
      errorMessage.textContent = data.detail || '上传失败';
      showPanel('failed');
      submitBtn.disabled = false;
      submitBtn.textContent = '🚀 开始检查';
    }
  } catch (err) {
    clearInterval(hintTimer);
    errorMessage.textContent = '网络错误: ' + err.message;
    showPanel('failed');
    submitBtn.disabled = false;
    submitBtn.textContent = '🚀 开始检查';
  }
});
</script>
{% endblock %}
