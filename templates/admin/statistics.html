{% extends "base.html" %}
{% block title %}统计分析 - DocCheck{% endblock %}
{% block page_title %}📊 统计分析{% endblock %}

{% block content %}
<style>
.stats-container { max-width: 1200px; }
.filter-bar {
  display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
  background: var(--bg-card); padding: 1rem 1.25rem; border-radius: 8px;
  border: 1px solid var(--border); margin-bottom: 1.5rem;
}
.filter-bar label { font-size: 0.8rem; color: var(--text-secondary); }
.filter-bar input[type="date"] {
  border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.6rem;
  font-size: 0.85rem; background: var(--bg-main);
}
.stat-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem; margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.25rem; text-align: center;
  transition: box-shadow 0.2s;
}
.stat-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.stat-card .num { font-size: 2rem; font-weight: 700; line-height: 1.2; }
.stat-card .label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
.section-title { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.75rem; }
.section-title-bar {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 0.5rem;
}
.chart-switch {
  display: flex; gap: 0.25rem;
}
.chart-switch button {
  font-size: 0.75rem; padding: 0.25rem 0.6rem; border: 1px solid var(--border);
  border-radius: 4px; background: var(--bg-main); cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s;
}
.chart-switch button:hover { background: #e2e8f0; }
.chart-switch button.active {
  background: #3b82f6; color: #fff; border-color: #3b82f6;
}
.chart-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem;
  min-height: 200px;
}
.stats-table {
  width: 100%; border-collapse: collapse; font-size: 0.9rem;
}
.stats-table th { background: var(--bg-main); text-align: left; padding: 0.6rem 0.75rem; font-weight: 600; font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 2px solid var(--border); }
.stats-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); }
.stats-table tr:last-child td { border-bottom: none; }
.chart-bar-container { display: flex; align-items: center; gap: 0.5rem; }
.chart-bar-h { height: 1.25rem; border-radius: 4px; min-width: 4px; transition: width 0.3s; }
.chart-bar-v {
  flex: 1; border-radius: 3px 3px 0 0; min-width: 8px; position: relative;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
}
.chart-bar-blue { background: #3b82f6; }
.chart-bar-green { background: #22c55e; }
.chart-bar-red { background: #ef4444; }
.chart-bar-amber { background: #f59e0b; }
.chart-bar-purple { background: #a855f7; }
.chart-bar-cyan { background: #06b6d4; }
.chart-bar-pink { background: #ec4899; }
.chart-bar-gray { background: #94a3b8; }
.chart-colors { color: #3b82f6 #22c55e #f59e0b #ef4444 #a855f7 #06b6d4 #ec4899 #94a3b8 #6366f1 #14b8a6; }
.trend-chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; padding: 1rem 0; }
.trend-bar { flex: 1; border-radius: 3px 3px 0 0; min-width: 8px; position: relative; background: #3b82f6; transition: height 0.3s; }
.trend-bar:hover { opacity: 0.8; }
.trend-label { font-size: 0.65rem; color: var(--text-secondary); text-align: center; margin-top: 0.25rem; white-space: nowrap; }

/* 饼图 */
.pie-chart-container { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
.pie-chart-svg { width: 160px; height: 160px; flex-shrink: 0; }
.pie-legend { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.85rem; }
.pie-legend-item { display: flex; align-items: center; gap: 0.5rem; }
.pie-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.pie-legend-count { color: var(--text-secondary); margin-left: auto; }

/* 柱状图竖排 */
.vbar-chart {
  display: flex; align-items: flex-end; gap: 6px; height: 160px;
  padding: 0.5rem 0.25rem;
}
.vbar {
  flex: 1; border-radius: 3px 3px 0 0; min-width: 12px; position: relative;
  transition: height 0.3s;
}
.vbar:hover { opacity: 0.85; }
.vbar-label {
  position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%) rotate(-30deg);
  font-size: 0.65rem; color: var(--text-secondary); white-space: nowrap; transform-origin: left top;
}
.vbar-val {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  font-size: 0.7rem; font-weight: 600;
}
/* 水平柱状图 */
.hbar-chart { display: flex; flex-direction: column; gap: 6px; padding: 0.5rem 0; }
.hbar-row { display: flex; align-items: center; gap: 0.5rem; }
.hbar-label { width: 80px; font-size: 0.8rem; text-align: right; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
.hbar-track { flex: 1; height: 22px; background: var(--bg-main); border-radius: 4px; position: relative; }
.hbar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; min-width: 4px; }
.hbar-val { position: absolute; right: -36px; top: 50%; transform: translateY(-50%); font-size: 0.75rem; font-weight: 600; }
.loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
.error-msg { color: #ef4444; padding: 1rem; }
</style>

<div class="stats-container">
  <!-- 筛选栏 -->
  <div class="filter-bar">
    <label>开始日期</label>
    <input type="date" id="startDate">
    <label>结束日期</label>
    <input type="date" id="endDate">
    <button class="btn btn-primary" onclick="loadStats()">查询</button>
    <button class="btn" onclick="clearFilter()">显示全部</button>
    <span id="filterHint" style="font-size: 0.8rem; color: var(--text-secondary); margin-left: 0.5rem;"></span>
  </div>

  <!-- 概览 -->
  <div class="stat-grid" id="overviewCards"></div>

  <!-- 检查趋势 -->
  <div class="section-title section-title-bar">
    <span>📈 检查趋势</span>
    <div class="chart-switch">
      <button class="active" data-chart="trend" onclick="switchView('trendView','trend')">柱状图</button>
      <button data-chart="table" onclick="switchView('trendView','table')">表格</button>
    </div>
  </div>
  <div class="chart-box" id="trendView"></div>

  <!-- 两列布局：文档类型 / 用户活跃度 -->
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
    <div>
      <div class="section-title section-title-bar">
        <span>📁 文档类型分布</span>
        <div class="chart-switch">
          <button class="active" data-chart="hbar" onclick="switchView('docTypeView','hbar')">水平柱</button>
          <button data-chart="vbar" onclick="switchView('docTypeView','vbar')">垂直柱</button>
          <button data-chart="pie" onclick="switchView('docTypeView','pie')">饼图</button>
          <button data-chart="table" onclick="switchView('docTypeView','table')">表格</button>
        </div>
      </div>
      <div class="chart-box" id="docTypeView"></div>
    </div>
    <div>
      <div class="section-title section-title-bar">
        <span>🧑 用户活跃度</span>
        <div class="chart-switch">
          <button class="active" data-chart="hbar" onclick="switchView('userView','hbar')">水平柱</button>
          <button data-chart="vbar" onclick="switchView('userView','vbar')">垂直柱</button>
          <button data-chart="table" onclick="switchView('userView','table')">表格</button>
        </div>
      </div>
      <div class="chart-box" id="userView"></div>
    </div>
  </div>

  <!-- 合规/审核/结论 -->
  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
    <div>
      <div class="section-title section-title-bar">
        <span>✅ 合规统计</span>
        <div class="chart-switch">
          <button class="active" data-chart="pie" onclick="switchView('compliantView','pie')">饼图</button>
          <button data-chart="table" onclick="switchView('compliantView','table')">表格</button>
        </div>
      </div>
      <div class="chart-box" id="compliantView"></div>
    </div>
    <div>
      <div class="section-title section-title-bar">
        <span>🔍 审核状态</span>
        <div class="chart-switch">
          <button class="active" data-chart="pie" onclick="switchView('reviewView','pie')">饼图</button>
          <button data-chart="hbar" onclick="switchView('reviewView','hbar')">柱状图</button>
          <button data-chart="table" onclick="switchView('reviewView','table')">表格</button>
        </div>
      </div>
      <div class="chart-box" id="reviewView"></div>
    </div>
    <div>
      <div class="section-title section-title-bar">
        <span>📋 报告结论</span>
        <div class="chart-switch">
          <button class="active" data-chart="pie" onclick="switchView('conclusionView','pie')">饼图</button>
          <button data-chart="hbar" onclick="switchView('conclusionView','hbar')">柱状图</button>
          <button data-chart="table" onclick="switchView('conclusionView','table')">表格</button>
        </div>
      </div>
      <div class="chart-box" id="conclusionView"></div>
    </div>
  </div>

  <!-- 规则命中 -->
  <div class="section-title section-title-bar">
    <span>📏 规则命中排行</span>
    <div class="chart-switch">
      <button class="active" data-chart="hbar" onclick="switchView('ruleView','hbar')">水平柱</button>
      <button data-chart="vbar" onclick="switchView('ruleView','vbar')">垂直柱</button>
      <button data-chart="table" onclick="switchView('ruleView','table')">表格</button>
    </div>
  </div>
  <div class="chart-box" id="ruleView"></div>
</div>

<script>
const COLORS = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4','#ec4899','#94a3b8','#6366f1','#14b8a6'];
let currentData = null;
let currentViews = {}; // { viewId: 'hbar'|'vbar'|'pie'|'table'|'trend' }

// ── 视图切换 ──────────────────────────────────
function switchView(viewId, chartType) {
  currentViews[viewId] = chartType;
  // 更新按钮active状态
  const container = document.getElementById(viewId).parentElement;
  container.querySelectorAll('.chart-switch button').forEach(b => {
    b.classList.toggle('active', b.dataset.chart === chartType);
  });
  rerenderView(viewId);
}

function rerenderView(viewId) {
  const type = currentViews[viewId] || 'table';
  const renderers = {
    trendView: () => renderTrend(currentData.daily_trend, type),
    docTypeView: () => renderDocTypes(currentData.doc_type_stats, type),
    userView: () => renderUsers(currentData.user_stats, type),
    compliantView: () => renderCompliant(currentData.compliant_stats, type),
    reviewView: () => renderReview(currentData.review_stats, type),
    conclusionView: () => renderConclusion(currentData.conclusion_stats, type),
    ruleView: () => renderRules(currentData.rule_stats, type),
  };
  if (renderers[viewId]) renderers[viewId]();
}

// ── 加载数据 ──────────────────────────────────
function loadStats() {
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  let url = '/api/admin/statistics';
  const params = [];
  if (start) params.push('start=' + start);
  if (end) params.push('end=' + end);
  if (params.length) url += '?' + params.join('&');

  document.getElementById('overviewCards').innerHTML = '<div class="loading">⏳ 加载中...</div>';
  document.getElementById('filterHint').textContent = start || end ? '正在查询...' : '';

  fetch(url)
    .then(r => r.json())
    .then(data => {
      currentData = data;
      // 初始化默认视图
      if (!currentViews.trendView) currentViews.trendView = 'trend';
      if (!currentViews.docTypeView) currentViews.docTypeView = 'hbar';
      if (!currentViews.userView) currentViews.userView = 'hbar';
      if (!currentViews.compliantView) currentViews.compliantView = 'pie';
      if (!currentViews.reviewView) currentViews.reviewView = 'pie';
      if (!currentViews.conclusionView) currentViews.conclusionView = 'pie';
      if (!currentViews.ruleView) currentViews.ruleView = 'hbar';
      renderAll(data);
      document.getElementById('filterHint').textContent = start || end
        ? (start || '不限') + ' ~ ' + (end || '不限') + ' | 共 ' + data.overview.check_count + ' 次检查'
        : '全部数据';
    })
    .catch(e => {
      document.getElementById('overviewCards').innerHTML = '<div class="error-msg">❌ 加载失败: ' + e.message + '</div>';
    });
}

function clearFilter() {
  document.getElementById('startDate').value = '';
  document.getElementById('endDate').value = '';
  loadStats();
}

function renderAll(data) {
  renderOverview(data.overview);
  rerenderView('trendView');
  rerenderView('docTypeView');
  rerenderView('userView');
  rerenderView('compliantView');
  rerenderView('reviewView');
  rerenderView('conclusionView');
  rerenderView('ruleView');
}

function renderOverview(ov) {
  const cards = [
    { num: ov.doc_count, label: '📄 文档数', color: '#3b82f6' },
    { num: ov.check_count, label: '🔍 总检查次数', color: '#8b5cf6' },
    { num: ov.done_count, label: '✅ 成功', color: '#22c55e' },
    { num: ov.failed_count, label: '❌ 失败', color: '#ef4444' },
    { num: ov.user_count, label: '👥 用户数', color: '#f59e0b' },
  ];
  document.getElementById('overviewCards').innerHTML = cards.map(c =>
    `<div class="stat-card"><div class="num" style="color:${c.color}">${c.num}</div><div class="label">${c.label}</div></div>`
  ).join('');
}

// ── SVG 饼图绘制 ──────────────────────────────
function renderPie(el, items) {
  if (!items || items.length === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-secondary)">暂无数据</div>'; return; }
  const total = items.reduce((s, i) => s + i.value, 0);
  if (total === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-secondary)">暂无数据</div>'; return; }
  const cx = 80, cy = 80, r = 68;
  let segs = '', angle = -90;
  items.forEach((item, idx) => {
    const pct = item.value / total;
    const a = pct * 360;
    const a2 = angle + a;
    const x1 = cx + r * Math.cos(angle * Math.PI / 180);
    const y1 = cy + r * Math.sin(angle * Math.PI / 180);
    const x2 = cx + r * Math.cos(a2 * Math.PI / 180);
    const y2 = cy + r * Math.sin(a2 * Math.PI / 180);
    const large = a > 180 ? 1 : 0;
    const color = item.color || COLORS[idx % COLORS.length];
    segs += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${color}" stroke="var(--bg-card)" stroke-width="1.5"/>`;
    angle = a2;
  });
  const legend = items.map((item, idx) => {
    const color = item.color || COLORS[idx % COLORS.length];
    const pct = total > 0 ? ((item.value / total) * 100).toFixed(1) : 0;
    return `<div class="pie-legend-item"><span class="pie-legend-dot" style="background:${color}"></span>${item.label} <span class="pie-legend-count">${item.value} (${pct}%)</span></div>`;
  }).join('');
  el.innerHTML = `<div class="pie-chart-container"><svg class="pie-chart-svg" viewBox="0 0 160 160">${segs}</svg><div class="pie-legend">${legend}</div></div>`;
}

// ── 水平柱状图 ──────────────────────────────
function renderHBar(el, items, labelKey, valKey, color = '#3b82f6', suffix = '') {
  if (!items || items.length === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-secondary)">暂无数据</div>'; return; }
  const maxVal = Math.max(...items.map(i => i[valKey]), 1);
  el.innerHTML = '<div class="hbar-chart">' + items.map(i => {
    const pct = (i[valKey] / maxVal) * 100;
    const label = typeof labelKey === 'function' ? labelKey(i) : i[labelKey];
    return `<div class="hbar-row"><div class="hbar-label" title="${label}">${label}</div><div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${color}"></div></div><div class="hbar-val">${i[valKey]}${suffix}</div></div>`;
  }).join('') + '</div>';
}

// ── 垂直柱状图 ──────────────────────────────
function renderVBar(el, items, labelKey, valKey, colors = null, suffix = '') {
  if (!items || items.length === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-secondary)">暂无数据</div>'; return; }
  const maxVal = Math.max(...items.map(i => i[valKey]), 1);
  el.innerHTML = '<div class="vbar-chart">' + items.map((i, idx) => {
    const pct = Math.max((i[valKey] / maxVal) * 100, 1);
    const c = colors ? (typeof colors === 'function' ? colors(idx) : colors[idx % colors.length]) : '#3b82f6';
    const label = typeof labelKey === 'function' ? labelKey(i) : i[labelKey];
    return `<div class="vbar" style="height:${pct}%;background:${c}" title="${label}: ${i[valKey]}${suffix}"><div class="vbar-val">${i[valKey]}${suffix}</div><div class="vbar-label">${label}</div></div>`;
  }).join('') + '</div>';
}

// ── 检查趋势 ──────────────────────────────
function renderTrend(trend, viewType) {
  const el = document.getElementById('trendView');
  if (!trend || trend.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-secondary)">暂无数据</div>';
    return;
  }
  if (viewType === 'table') {
    el.innerHTML = `<table class="stats-table"><tr><th>日期</th><th>检查次数</th></tr>${
      trend.map(t => `<tr><td>${t.date}</td><td>${t.count}</td></tr>`).join('')
    }</table>`;
    return;
  }
  // 柱状图模式（默认）
  const maxVal = Math.max(...trend.map(t => t.count), 1);
  el.innerHTML = '<div class="trend-chart">' + trend.map(t => {
    const pct = (t.count / maxVal) * 100;
    const day = t.date.slice(5);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;">
      <div class="trend-bar" style="height:${Math.max(pct, 2)}%;" title="${t.date}: ${t.count}次">${t.count > 0 ? '<span style="position:absolute;top:-18px;font-size:0.7rem;width:100%;text-align:center;">' + t.count + '</span>' : ''}</div>
      <div class="trend-label">${day}</div>
    </div>`;
  }).join('') + '</div>';
}

// ── 文档类型 ──────────────────────────────
function renderDocTypes(rows, viewType) {
  const el = document.getElementById('docTypeView');
  if (!rows || rows.length === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-secondary)">暂无数据</div>'; return; }
  if (viewType === 'table') {
    el.innerHTML = `<table class="stats-table"><tr><th>文档类型</th><th>文档数</th><th>检查次数</th></tr>${
      rows.map(r => `<tr><td>${r.name}</td><td>${r.doc_count}</td><td>${r.check_count}</td></tr>`).join('')
    }</table>`;
  } else if (viewType === 'vbar') {
    renderVBar(el, rows, r => r.name.length > 6 ? r.name.slice(0,6)+'…' : r.name, 'check_count', null, '次');
  } else if (viewType === 'pie') {
    const filterZero = rows.filter(r => r.check_count > 0);
    renderPie(el, filterZero.length > 0 ? filterZero.map((r, i) => ({label: r.name, value: r.check_count, color: COLORS[i % COLORS.length]})) : [{label:'无数据', value:0}]);
  } else {
    renderHBar(el, rows, 'name', 'check_count', '#3b82f6', '次');
  }
}

// ── 用户活跃度 ──────────────────────────────
function renderUsers(rows, viewType) {
  const el = document.getElementById('userView');
  if (!rows || rows.length === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-secondary)">暂无数据</div>'; return; }
  if (viewType === 'table') {
    el.innerHTML = `<table class="stats-table"><tr><th>用户</th><th>上传文档</th><th>检查次数</th></tr>${
      rows.map(r => `<tr><td>${r.display_name}</td><td>${r.upload_count}</td><td>${r.check_count}</td></tr>`).join('')
    }</table>`;
  } else if (viewType === 'vbar') {
    renderVBar(el, rows, 'display_name', 'upload_count', null, '个');
  } else {
    renderHBar(el, rows, 'display_name', 'upload_count', '#22c55e', '个');
  }
}

// ── 合规统计 ──────────────────────────────
function renderCompliant(s, viewType) {
  const el = document.getElementById('compliantView');
  if (viewType === 'table' || viewType !== 'pie') {
    el.innerHTML = `<table class="stats-table">
      <tr><th>状态</th><th>数量</th><th>占比</th></tr>
      <tr><td style="color:#22c55e">✅ 通过</td><td>${s.pass}</td><td>${s.pass_rate}%</td></tr>
      <tr><td style="color:#ef4444">❌ 不通过</td><td>${s.fail}</td><td>${s.fail_rate}%</td></tr>
      <tr><td style="color:#94a3b8">❓ 未知</td><td>${s.unknown}</td><td>${s.total > 0 ? ((s.unknown/s.total)*100).toFixed(1) : 0}%</td></tr>
      <tr style="font-weight:600"><td>合计</td><td>${s.total}</td><td>100%</td></tr>
    </table>`;
  } else {
    const items = [
      {label:'✅ 通过', value: s.pass, color: '#22c55e'},
      {label:'❌ 不通过', value: s.fail, color: '#ef4444'},
      {label:'❓ 未知', value: s.unknown, color: '#94a3b8'},
    ].filter(i => i.value > 0);
    renderPie(el, items);
  }
}

// ── 审核状态 ──────────────────────────────
function renderReview(s, viewType) {
  const el = document.getElementById('reviewView');
  const items = [
    {label:'⏳ 待审核', value: s.pending},
    {label:'✅ 已确认', value: s.confirmed},
    {label:'✏️ 已驳回', value: s.rejected},
    {label:'⏭️ 已忽略', value: s.ignored},
  ];
  if (viewType === 'table') {
    el.innerHTML = `<table class="stats-table">
      <tr><th>状态</th><th>数量</th></tr>${
        items.map(i => `<tr><td>${i.label}</td><td>${i.value}</td></tr>`).join('')
      }<tr style="font-weight:600"><td>合计</td><td>${s.total}</td></tr></table>`;
  } else if (viewType === 'hbar') {
    const filtered = items.filter(i => i.value > 0);
    renderHBar(el, filtered, 'label', 'value', '#a855f7', '条');
  } else {
    const filtered = items.filter(i => i.value > 0);
    const pies = filtered.map((i, idx) => ({label: i.label, value: i.value, color: COLORS[idx % COLORS.length]}));
    renderPie(el, pies);
  }
}

// ── 报告结论 ──────────────────────────────
function renderConclusion(s, viewType) {
  const el = document.getElementById('conclusionView');
  const items = [
    {label:'✅ 通过', value: s.pass},
    {label:'⚠️ 有条件通过', value: s.conditional_pass},
    {label:'❌ 不通过', value: s.fail},
    {label:'⏳ 待审核', value: s.pending},
  ];
  if (viewType === 'table') {
    el.innerHTML = `<table class="stats-table">
      <tr><th>结论</th><th>数量</th></tr>${
        items.map(i => `<tr><td>${i.label}</td><td>${i.value}</td></tr>`).join('')
      }<tr style="font-weight:600"><td>合计</td><td>${s.total}</td></tr></table>`;
  } else if (viewType === 'hbar') {
    const filtered = items.filter(i => i.value > 0);
    renderHBar(el, filtered, 'label', 'value', '#f59e0b', '份');
  } else {
    const filtered = items.filter(i => i.value > 0);
    const pies = filtered.map((i, idx) => ({label: i.label, value: i.value, color: [COLORS[1],COLORS[2],COLORS[3],COLORS[7]][idx % 4]}));
    renderPie(el, pies);
  }
}

// ── 规则命中 ──────────────────────────────
function renderRules(rows, viewType) {
  const el = document.getElementById('ruleView');
  if (!rows || rows.length === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-secondary)">暂无数据</div>'; return; }
  if (viewType === 'table') {
    el.innerHTML = `<table class="stats-table"><tr><th>规则名称</th><th>命中次数</th><th>不通过次数</th></tr>${
      rows.map(r => `<tr><td>${r.name}</td><td>${r.hit_count}</td><td>${r.fail_count}</td></tr>`).join('')
    }</table>`;
  } else if (viewType === 'vbar') {
    renderVBar(el, rows, r => r.name.length > 6 ? r.name.slice(0,6)+'…' : r.name, 'hit_count', null, '次');
  } else {
    renderHBar(el, rows, 'name', 'hit_count', '#f59e0b', '次');
  }
}

document.addEventListener('DOMContentLoaded', loadStats);
</script>
{% endblock %}
