{% extends "base.html" %}
{% block title %}DocCheck - 登录{% endblock %}

{% block content %}
<div class="login-page" style="margin: -2rem; width: calc(100% + 4rem);">
  <div class="login-card">
    <h1>DocCheck</h1>
    <p class="subtitle">AI 文档合规检查工具</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/api/auth/login">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required autofocus placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required placeholder="请输入密码">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">登 录</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
