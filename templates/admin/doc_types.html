{% extends "base.html" %}
{% block title %}文档类型管理 - DocCheck{% endblock %}
{% block page_title %}📂 文档类型管理{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
  <div></div>
  <button class="btn btn-primary btn-sm" onclick="showAddDocType()">➕ 新增文档类型</button>
</div>

<table id="docTypeTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>名称</th>
      <th>排序</th>
      <th>关联规则数</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody id="docTypeTableBody">
    <tr><td colspan="5" style="text-align: center; color: #94a3b8;">加载中...</td></tr>
  </tbody>
</table>

<div id="modalOverlay" class="modal-overlay" style="display: none;" onclick="closeDocTypeModal()"></div>
<div id="docTypeModal" class="modal" style="display: none;">
  <div class="modal-content">
    <h4 id="docTypeModalTitle">新增文档类型</h4>
    <input type="hidden" id="editDocTypeId" value="">
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="formName" class="form-control" placeholder="如：管理制度、技术方案">
    </div>
    <div class="form-group">
      <label>排序号</label>
      <input type="number" id="formSortOrder" class="form-control" value="0" min="0">
    </div>
    <div class="form-group">
      <label>关联规则</label>
      <div id="ruleCheckboxList" style="display: flex; flex-wrap: wrap; gap: 0.375rem; margin-top: 0.25rem; max-height: 200px; overflow-y: auto; padding: 0.25rem 0;">
        <span style="color: #94a3b8; font-size: 0.8rem;">加载规则列表...</span>
      </div>
    </div>
    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
      <button id="modalSaveBtn" class="btn btn-primary" onclick="saveDocType()">保存</button>
      <button class="btn" onclick="closeDocTypeModal()">取消</button>
    </div>
  </div>
</div>

{% raw %}
<script>
let allRules = [];

async function loadDocTypes() {
  try {
    const resp = await fetch('/api/admin/doc-types');
    const types = await resp.json();
    const tbody = document.getElementById('docTypeTableBody');
    tbody.innerHTML = types.map(t => `<tr>
      <td>${t.id}</td>
      <td>${t.name}</td>
      <td>${t.sort_order}</td>
      <td>${t.rule_count}</td>
      <td>
        <button class="btn btn-sm" onclick="editDocType(${t.id})">编辑</button>
        <button class="btn btn-sm btn-warning" onclick="deleteDocType(${t.id})">删除</button>
      </td>
    </tr>`).join('');
  } catch (e) {
    document.getElementById('docTypeTableBody').innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ef4444;">加载失败: ${e.message}</td></tr>`;
  }
}

async function loadAllRules() {
  try {
    const resp = await fetch('/api/admin/rules?page_size=200');
    allRules = await resp.json();
  } catch (e) {
    console.error('加载规则列表失败:', e);
    allRules = [];
  }
}

function renderRuleCheckboxes(selectedIds) {
  const container = document.getElementById('ruleCheckboxList');
  if (!allRules.length) {
    container.innerHTML = '<span style="color: #94a3b8; font-size: 0.8rem;">暂无规则，请先在规则管理中创建</span>';
    return;
  }
  const selected = new Set(selectedIds || []);
  container.innerHTML = allRules.map(r => `
    <label style="display: flex; align-items: center; gap: 0.25rem; padding: 0.25rem 0.5rem; border: 1px solid #e2e8f0; border-radius: 4px; cursor: pointer; background: #f8fafc; color: #1e293b; font-size: 0.8rem;">
      <input type="checkbox" class="rule-cb" value="${r.id}" ${selected.has(r.id) ? 'checked' : ''} style="accent-color: #6366f1;">
      ${r.name}
    </label>
  `).join('');
}

function showAddDocType() {
  document.getElementById('docTypeModalTitle').textContent = '新增文档类型';
  document.getElementById('editDocTypeId').value = '';
  document.getElementById('formName').value = '';
  document.getElementById('formSortOrder').value = '0';
  renderRuleCheckboxes([]);
  document.getElementById('docTypeModal').style.display = 'block';
  document.getElementById('modalOverlay').style.display = 'block';
}

function editDocType(id) {
  // Find the doc type from table data
  const rows = document.getElementById('docTypeTableBody').querySelectorAll('tr');
  // We need the API data, so re-fetch is simpler
  fetch('/api/admin/doc-types').then(r => r.json()).then(types => {
    const t = types.find(x => x.id === id);
    if (!t) return;
    document.getElementById('docTypeModalTitle').textContent = '编辑文档类型';
    document.getElementById('editDocTypeId').value = t.id;
    document.getElementById('formName').value = t.name;
    document.getElementById('formSortOrder').value = t.sort_order;
    renderRuleCheckboxes(t.rule_ids || []);
    document.getElementById('docTypeModal').style.display = 'block';
    document.getElementById('modalOverlay').style.display = 'block';
  });
}

function closeDocTypeModal() {
  document.getElementById('docTypeModal').style.display = 'none';
  document.getElementById('modalOverlay').style.display = 'none';
}

async function saveDocType() {
  const id = document.getElementById('editDocTypeId').value;
  const data = {
    name: document.getElementById('formName').value,
    sort_order: parseInt(document.getElementById('formSortOrder').value) || 0,
    rule_ids: Array.from(document.querySelectorAll('.rule-cb:checked')).map(cb => parseInt(cb.value)),
  };
  if (!data.name) { alert('请输入文档类型名称'); return; }

  try {
    let resp;
    if (id) {
      resp = await fetch(`/api/admin/doc-types/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
      });
    } else {
      resp = await fetch('/api/admin/doc-types', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
      });
    }
    if (resp.ok) {
      closeDocTypeModal();
      loadDocTypes();
    } else {
      const err = await resp.json();
      alert(err.detail || '操作失败');
    }
  } catch (e) {
    alert('网络错误: ' + e.message);
  }
}

async function deleteDocType(id) {
  if (!confirm('确定要删除此文档类型吗？如果有关联规则将无法删除。')) return;
  try {
    const resp = await fetch(`/api/admin/doc-types/${id}`, {method: 'DELETE'});
    if (resp.ok) {
      loadDocTypes();
    } else {
      const err = await resp.json();
      alert(err.detail || '删除失败');
    }
  } catch (e) {
    alert('网络错误: ' + e.message);
  }
}

// Init
loadAllRules().then(() => loadDocTypes());
</script>
{% endraw %}
{% endblock %}
