{% extends "base.html" %}
{% block title %}审计日志 - DocCheck{% endblock %}
{% block page_title %}📋 审计日志{% endblock %}

{% block content %}
<!-- 筛选条件 -->
<div class="card" style="margin-bottom: 1rem;">
  <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
    <div class="form-group" style="margin: 0; min-width: 150px;">
      <label style="font-size: 0.8rem;">操作类型</label>
      <select id="filterAction" class="form-control" style="padding: 0.375rem 0.5rem;">
        <option value="">全部</option>
        <option value="login">登录</option>
        <option value="logout">登出</option>
        <option value="user_create">新增用户</option>
        <option value="llm_config_update">LLM配置更新</option>
        <option value="review_confirm">审核确认</option>
        <option value="review_reject">审核驳回</option>
        <option value="review_ignore">审核忽略</option>
        <option value="conclude">出结论</option>
      </select>
    </div>
    <div class="form-group" style="margin: 0; min-width: 140px;">
      <label style="font-size: 0.8rem;">开始时间</label>
      <input type="datetime-local" id="filterStart" class="form-control" style="padding: 0.375rem 0.5rem;">
    </div>
    <div class="form-group" style="margin: 0; min-width: 140px;">
      <label style="font-size: 0.8rem;">结束时间</label>
      <input type="datetime-local" id="filterEnd" class="form-control" style="padding: 0.375rem 0.5rem;">
    </div>
    <button class="btn btn-sm btn-primary" onclick="loadLogs(1)">🔍 筛选</button>
    <button class="btn btn-sm" onclick="resetFilter()">重置</button>
  </div>
</div>

<!-- 日志列表 -->
<table>
  <thead>
    <tr>
      <th>时间</th>
      <th>操作人</th>
      <th>操作类型</th>
      <th>目标</th>
      <th>详情</th>
    </tr>
  </thead>
  <tbody id="logTableBody">
    <tr><td colspan="5" style="text-align: center; color: #94a3b8;">加载中...</td></tr>
  </tbody>
</table>

<!-- 分页 -->
<div id="pagination" style="display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem;"></div>

<script>
let currentPage = 1;
let totalPages = 1;

const actionLabels = {
  'login': '登录', 'logout': '登出',
  'user_create': '新增用户', 'llm_config_update': 'LLM配置更新',
  'review_confirm': '审核确认', 'review_reject': '审核驳回',
  'review_ignore': '审核忽略', 'conclude': '出结论',
};

async function loadLogs(page) {
  currentPage = page;
  const action = document.getElementById('filterAction').value;
  const start = document.getElementById('filterStart').value;
  const end = document.getElementById('filterEnd').value;

  let url = `/api/admin/audit-log?page=${page}&page_size=30`;
  if (action) url += `&action=${action}`;
  if (start) url += `&start=${start}`;
  if (end) url += `&end=${end}`;

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    const tbody = document.getElementById('logTableBody');

    if (data.items && data.items.length > 0) {
      tbody.innerHTML = data.items.map(log => `
        <tr>
          <td style="white-space: nowrap; font-size: 0.8rem;">${new Date(log.created_at).toLocaleString('zh-CN')}</td>
          <td>${log.username || '-'}</td>
          <td><span class="badge badge-neutral">${actionLabels[log.action] || log.action}</span></td>
          <td style="font-size: 0.8rem; color: #64748b;">${log.target_type || '-'}#${log.target_id || '-'}</td>
          <td style="font-size: 0.85rem;">${log.detail || '-'}</td>
        </tr>
      `).join('');
    } else {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #94a3b8;">暂无审计日志</td></tr>';
    }

    // Pagination
    totalPages = data.total_pages || 1;
    renderPagination();
  } catch (e) {
    document.getElementById('logTableBody').innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ef4444;">加载失败: ${e.message}</td></tr>`;
  }
}

function renderPagination() {
  const container = document.getElementById('pagination');
  if (totalPages <= 1) { container.innerHTML = ''; return; }

  let html = '';
  if (currentPage > 1) html += `<button class="btn btn-sm" onclick="loadLogs(${currentPage - 1})">‹ 上一页</button>`;
  html += `<span style="padding: 0.375rem 0.75rem; color: #64748b;">第 ${currentPage}/${totalPages} 页</span>`;
  if (currentPage < totalPages) html += `<button class="btn btn-sm" onclick="loadLogs(${currentPage + 1})">下一页 ›</button>`;
  container.innerHTML = html;
}

function resetFilter() {
  document.getElementById('filterAction').value = '';
  document.getElementById('filterStart').value = '';
  document.getElementById('filterEnd').value = '';
  loadLogs(1);
}

loadLogs(1);
</script>
{% endblock %}
