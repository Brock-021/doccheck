{% extends "base.html" %}
{% block title %}{% if rule %}编辑规则{% else %}新增规则{% endif %} - DocCheck{% endblock %}
{% block page_title %}{% if rule %}✏️ 编辑规则{% else %}➕ 新增规则{% endif %}{% endblock %}

{% block content %}
<form method="post" action="/api/admin/rules{% if rule %}/{{ rule.id }}{% endif %}"
      onsubmit="return handleRuleSubmit(event, {% if rule %}{{ rule.id }}{% else %}null{% endif %})">
  <input type="hidden" name="_method" value="{% if rule %}PUT{% else %}POST{% endif %}">

  <div class="form-group">
    <label for="name">规则名称 *</label>
    <input type="text" id="name" name="name" required
           value="{{ rule.name if rule else '' }}" placeholder="如：必须包含投资估算章节">
  </div>

  <div class="form-group">
    <label>文档类型 *（可多选）</label>
    <div style="margin-bottom: 0.5rem;">
      <button type="button" class="btn btn-xs" onclick="selectAllDocTypes(true)" style="padding: 0.2rem 0.5rem; font-size: 0.75rem;">✅ 一键关联</button>
      <button type="button" class="btn btn-xs" onclick="selectAllDocTypes(false)" style="padding: 0.2rem 0.5rem; font-size: 0.75rem;">🔄 反选</button>
    </div>
    <div id="docTypeCheckboxes" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem;">
      {% for dt in doc_types %}
      <label class="checkbox-label" style="display: flex; align-items: center; gap: 0.25rem; padding: 0.375rem 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; background: #f8fafc; color: #1e293b;">
        <input type="checkbox" name="doc_type_ids" value="{{ dt.id }}"
               {% if rule and dt.id in rule.doc_type_ids %}checked{% endif %}
               style="accent-color: #6366f1;">
        {{ dt.name }}
      </label>
      {% endfor %}
    </div>
  </div>

  <div class="form-group">
    <label for="description">规则描述 *</label>
    <textarea id="description" name="description" required
              placeholder="用自然语言描述规则内容，供 AI 判断">{{ rule.description if rule else '' }}</textarea>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
    <div class="form-group">
      <label for="severity">严重程度</label>
      <select id="severity" name="severity">
        <option value="must_fix" {% if rule and rule.severity == 'must_fix' %}selected{% endif %}>🔴 必须改</option>
        <option value="suggest" {% if rule and rule.severity == 'suggest' %}selected{% endif %}>🟡 建议改</option>
      </select>
    </div>
    <div class="form-group">
      <label for="stage">适用阶段</label>
      <select id="stage" name="stage">
        <option value="all" {% if rule and rule.stage == 'all' %}selected{% endif %}>通用</option>
        <option value="initial" {% if rule and rule.stage == 'initial' %}selected{% endif %}>初审</option>
        <option value="final" {% if rule and rule.stage == 'final' %}selected{% endif %}>终审</option>
      </select>
    </div>
    <div class="form-group">
      <label for="sort_order">排序号</label>
      <input type="number" id="sort_order" name="sort_order" value="{{ rule.sort_order if rule else 0 }}" min="0">
    </div>
  </div>

  <div class="form-group">
    <label>
      <input type="checkbox" id="is_active" name="is_active"
             {% if not rule or rule.is_active %}checked{% endif %}>
      启用此规则
    </label>
  </div>

  <div class="form-actions">
    <a href="/admin/rules" class="btn">取消</a>
    <button type="submit" class="btn btn-primary">保存</button>
  </div>
</form>

<script>
function selectAllDocTypes(selectAll) {
  const cbs = document.querySelectorAll('#docTypeCheckboxes input[name="doc_type_ids"]');
  cbs.forEach(cb => {
    if (selectAll) {
      cb.checked = true;
    } else {
      cb.checked = !cb.checked;
    }
  });
}

async function handleRuleSubmit(event, ruleId) {
  event.preventDefault();
  const form = event.target;

  // Collect checked doc type ids
  const docTypeCheckboxes = form.querySelectorAll('input[name="doc_type_ids"]:checked');
  const docTypeIds = Array.from(docTypeCheckboxes).map(cb => parseInt(cb.value));
  if (docTypeIds.length === 0) {
    alert('请至少选择一个文档类型');
    return false;
  }

  const data = {
    doc_type_ids: docTypeIds,
    name: form.name.value,
    description: form.description.value,
    severity: form.severity.value,
    stage: form.stage.value,
    sort_order: parseInt(form.sort_order.value || 0),
    is_active: form.is_active.checked,
  };

  let url, method;
  if (ruleId) {
    url = `/api/admin/rules/${ruleId}`;
    method = 'PUT';
  } else {
    url = '/api/admin/rules';
    method = 'POST';
  }

  const resp = await fetch(url, {
    method: method,
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });

  if (resp.ok) {
    window.location.href = '/admin/rules';
  } else {
    try {
      const err = await resp.json();
      alert(err.detail || '保存失败');
    } catch {
      alert('保存失败');
    }
  }
  return false;
}
</script>
{% endblock %}
